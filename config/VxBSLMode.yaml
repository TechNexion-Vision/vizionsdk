edm-g-imx8mp:
  "1-0048": "(timeout 1s gpioset -c 0 8=0 || true); (timeout 1s gpioset -c 5 2=1 || true); (timeout 1s gpioset -c 0 8=1 || true); sleep 1; (timeout 1s gpioset -c 5 2=0 || true); true"
  "4-0048": "(timeout 1s gpioset -c 3 4=0 || true); (timeout 1s gpioset -c 5 10=1 || true); (timeout 1s gpioset -c 3 4=1 || true); sleep 1; (timeout 1s gpioset -c 5 10=0 || true); true"

raspberrypi5:
  "10-0048": "(pinctrl set 34 op dl || true); (timeout 0.1s gpioset -c 15 6=1 || true); (pinctrl set 34 op dh || true); (sleep 0.1 || true); (timeout 0.1s gpioset -c 15 6=0 || true); true"
  "11-0048": "(pinctrl set 46 op dl || true); (timeout 0.1s gpioset -c 14 6=1 || true); (pinctrl set 46 op dh || true); (sleep 0.1 || true); (timeout 0.1s gpioset -c 14 6=0 || true); true"

orinnano:
  "9-0039": 'SUPPLIER=$(ls -d /sys/bus/i2c/devices/9-0039/supplier:i2c:* 2>/dev/null | head -n1); [ -n "$SUPPLIER" ] || exit 0; SUP="${SUPPLIER##*:}"; BUS="${SUP%-*}"; RAW="${SUP#*-}"; ADDR="0x$(printf "%x" 0x$RAW)"; (sleep 10 || true); (timeout 1s i2ctransfer -f -y "$BUS" w2@"$ADDR" 0x01 0xef || true); (timeout 1s i2ctransfer -f -y "$BUS" w2@"$ADDR" 0x01 0xff || true); (sleep 0.1 || true); (timeout 1s i2ctransfer -f -y "$BUS" w2@"$ADDR" 0x01 0xfb || true); true'
